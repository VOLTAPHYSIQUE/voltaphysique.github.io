<!doctype html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOLTA - Admin Portal</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
</head>

<body class="h-full bg-[#0a0a0a] text-white font-inter overflow-x-hidden">
    <div class="lightning-bg lightning-blur min-h-screen pt-12 pb-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">

            <!-- Header -->
            <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-10 mt-8">
                <div>
                    <h1 class="font-bebas text-4xl sm:text-5xl tracking-wider mb-2">ADMIN <span
                            class="text-orange-500">DASHBOARD</span></h1>
                    <p class="text-gray-400">Manage your athletes and track their progress</p>
                </div>
                <div class="flex flex-col sm:flex-row gap-4 mt-4 md:mt-0">
                    <button onclick="openAdminModal('tracker')"
                        class="px-6 py-3 rounded-xl btn-primary text-sm font-semibold uppercase tracking-wider transition-all flex items-center justify-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4">
                            </path>
                        </svg>
                        Client Tracker
                    </button>
                    <button onclick="openAdminModal('updates')"
                        class="px-6 py-3 rounded-xl border border-orange-500 hover:bg-orange-500/10 text-orange-500 text-sm font-semibold uppercase tracking-wider transition-all flex items-center justify-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z">
                            </path>
                        </svg>
                        Weekly Updates
                    </button>
                    <button onclick="adminLogout()"
                        class="px-6 py-3 rounded-xl border border-red-500/50 hover:border-red-500 hover:bg-red-500/10 text-red-500 text-sm font-semibold uppercase tracking-wider transition-all">
                        Lock & Exit
                    </button>
                </div>
            </div>

            <!-- Stats -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-10">
                <div class="stat-card p-6 rounded-2xl border-orange-500/30">
                    <p class="text-gray-400 text-sm uppercase tracking-wider mb-2">Total Athletes</p>
                    <p id="admin-total-users" class="font-bebas text-5xl text-orange-500">0</p>
                </div>
                <div class="stat-card p-6 rounded-2xl border-green-500/30">
                    <p class="text-gray-400 text-sm uppercase tracking-wider mb-2">Active Subscribers</p>
                    <p id="admin-active-users" class="font-bebas text-5xl text-green-500">0</p>
                </div>
                <div class="stat-card p-6 rounded-2xl border-yellow-500/30">
                    <p class="text-gray-400 text-sm uppercase tracking-wider mb-2">Pending Leads</p>
                    <p id="admin-pending-users" class="font-bebas text-5xl text-yellow-500">0</p>
                </div>
            </div>

            <!-- Athletes Directory Section (الكروت الجديدة) -->
            <div class="rounded-2xl card-dark p-6 sm:p-8 mb-10">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
                    <h3 class="font-bebas text-2xl tracking-wider flex items-center gap-3">
                        <svg class="w-8 h-8 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                        </svg> ATHLETES DIRECTORY
                    </h3>
                    <button onclick="toggleClientsView()" id="toggle-clients-btn"
                        class="px-6 py-3 rounded-xl border border-orange-500/50 hover:border-orange-500 text-orange-500 text-sm font-semibold uppercase tracking-wider transition-all">
                        Show Athletes
                    </button>
                </div>

                <!-- الشبكة المخفية اللي هيظهر فيها كروت المشتركين -->
                <div id="clients-grid" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6 transition-all">
                </div>
            </div>

        </div>
    </div>

    <!-- Admin Modal (Tables Interface) -->
    <div id="admin-modal" class="fixed inset-0 z-50 hidden opacity-0 transition-opacity duration-300">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-md" onclick="closeAdminModal()"></div>
        <div class="absolute inset-4 md:inset-10 lg:inset-x-20 z-10 rounded-2xl card-dark flex flex-col overflow-hidden transform scale-95 transition-transform duration-300"
            id="admin-modal-content">
            <div class="flex items-center justify-between p-6 border-b border-orange-500/20 bg-[#1a1a1a]">
                <h2 id="admin-modal-title" class="font-bebas text-3xl sm:text-4xl tracking-wider text-white">TITLE</h2>
                <div class="flex items-center gap-4">
                    <a id="admin-modal-link" href="#" target="_blank"
                        class="hidden sm:flex px-4 py-2 rounded-lg border border-orange-500/50 text-orange-500 text-xs uppercase tracking-wider hover:bg-orange-500/10 transition-colors">Edit
                        in Google Sheets</a>
                    <button onclick="closeAdminModal()" class="text-gray-400 hover:text-red-500 transition-colors">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="p-0 sm:p-6 overflow-y-auto flex-1">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse whitespace-nowrap">
                        <thead id="admin-modal-thead"></thead>
                        <tbody id="admin-modal-tbody" class="text-gray-300 text-sm divide-y divide-orange-500/10">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>

</html>
